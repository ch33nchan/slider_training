transformer_path: "models/klein-9b/flux-2-klein-9b.safetensors"
vae_path: "models/klein-9b/ae.safetensors"
te_path: "Qwen/Qwen3-8B"
device: "cuda:0"

neg_image_dir: "data/gaze_vertical_texture/neg/"
pos_image_dir: "data/gaze_vertical_texture/pos/"
neutral_image_dir: "data/gaze_vertical_texture/neutral/"
mask_dir: "data/gaze_vertical_texture/masks/"
prompt: "a person"

rank: 64
alpha: 1
train_method: "xattn"
lr: 0.001
eta: 8
max_train_steps: 4000
sample_every: 400
height: 1024
width: 1024

# Eye-focused training to avoid LivePortrait soft-skin transfer.
eye_region_weight: 6.0
non_eye_region_weight: 0.35
bg_preserve_weight: 0.2

output_dir: "outputs/gaze_vertical_klein_texture"
