---
job: extension
config:
  name: "eye_gaze_klein_v2"
  process:
    - type: 'image_reference_slider_trainer'
      training_folder: "output"
      device: cuda:0

      network:
        type: "lora"
        linear: 32         # rank
        linear_alpha: 16

      save:
        dtype: bf16
        save_every: 500
        max_step_saves_to_keep: 4

      slider:
        datasets:
          - neg_folder: "/mnt/data1/srini/eyegaze/slider_training/SliderTraining-Klein/data/columbia_gaze/neg"
            pos_folder: "/mnt/data1/srini/eyegaze/slider_training/SliderTraining-Klein/data/columbia_gaze/pos"
            network_weight: 1.5
            target_class: "a person"
            size: 1024
        weight_jitter: 0.05

      train:
        batch_size: 1
        steps: 2000
        gradient_accumulation_steps: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        optimizer: "adamw8bit"
        lr: 1e-4
        dtype: bf16
        ema_config:
          use_ema: true
          ema_decay: 0.99

      model:
        name_or_path: "/mnt/data1/srini/eyegaze/slider_training/SliderTraining-Klein/models/klein-9b"
        arch: "flux2_klein_9b"
        quantize: true

      sample:
        sampler: "flowmatch"
        sample_every: 500
        width: 512
        height: 512
        prompts:
          - "a person"
          - "a person looking to the right"
          - "a person looking to the left"
        seed: 42
        guidance_scale: 1.0
        sample_steps: 20

meta:
  name: "[name]"
  version: '1.0'
