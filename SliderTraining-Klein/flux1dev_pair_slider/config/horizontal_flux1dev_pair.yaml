pretrained_model_name_or_path: "/mnt/data1/models/base-models/black-forest-labs/FLUX.1-dev"
device: "cuda:0"

neg_image_dir: "data/gaze_horizontal_texture_maskfix_30/neg"
pos_image_dir: "data/gaze_horizontal_texture_maskfix_30/pos"
neutral_image_dir: "data/gaze_horizontal_texture_maskfix_30/neutral"
mask_dir: "data/gaze_horizontal_texture_maskfix_30/masks"

prompt: "portrait of a person"
height: 1024
width: 1024

