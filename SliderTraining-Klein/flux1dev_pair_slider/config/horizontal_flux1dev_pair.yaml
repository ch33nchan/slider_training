pretrained_model_name_or_path: "/mnt/data1/models/base-models/black-forest-labs/FLUX.1-dev"
device: "cuda:0"

data_root: "data/columbia_5level"
metadata_path: "data/columbia_5level/metadata.json"
num_gaze_levels: 5
training_scale_levels: [-2, -1, 0, 1, 2]
neutral_level: 0

prompt: "portrait of a person"
height: 512
width: 512

output_dir: "flux1dev_pair_slider/outputs_columbia_l2cs"
slider_name: "gaze_horizontal_flux1dev_columbia_l2cs"

rank: 16
alpha: 16
train_method: "xattn"
lr: 0.0005
max_train_steps: 4000
sample_every: 500
eta: 1.0

weighting_scheme: "none"
logit_mean: 0.0
logit_std: 1.0
mode_scale: 1.29

eye_region_weight: 2.0
non_eye_region_weight: 0.05
non_eye_preserve_weight: 0.5
bg_preserve_weight: 0.5

train_eye_crop_only: false
eye_crop_padding: 4.0
eye_crop_threshold: 0.08
eye_crop_min_size: 192
eye_crop_shift_jitter: 0.0
eye_crop_scale_jitter: 0.0

gaze_geometry_weight: 5.0
gaze_direction_weight: 0.8
l2cs_model_path: "models/l2cs/l2cs_resnet50_gaze360.pth"
l2cs_num_bins: 90
l2cs_angle_min_deg: -42.0
l2cs_angle_max_deg: 42.0
